data:
  raw_path: "data/raw_data.csv"
  processed_dir: "data/processed/"
  target_col: "target"

models:
  logistic_regression:
    C: 0.1
    max_iter: 1000
    solver: "lbfgs"

  random_forest:
    n_estimators: 150
    max_depth: 6
    min_samples_split: 4
    random_state: 42

  gradient_boosting:
    n_estimators: 100
    learning_rate: 0.05
    max_depth: 3
    random_state: 42
